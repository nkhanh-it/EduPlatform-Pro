# ===========================
# EduPlatform Pro - Config
# ===========================
server.port=8080

# --- H2 Database (dev mode) ---
spring.datasource.url=jdbc:h2:file:./data/eduplatform;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL (production) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/eduplatform?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- JWT ---
jwt.secret=EduPlatformProSecretKey2026VeryLongSecureKeyForJWTSigning123456789
jwt.expiration=86400000

# --- CORS ---
# Allow local FE on Vite (5173) and other dev ports like 3000
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# --- File upload ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- Logging ---
logging.level.com.eduplatform=DEBUG
